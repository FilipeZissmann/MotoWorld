<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MotoWorld Pesquisa</title>
    <link rel="stylesheet" href="css/page1style.css">
</head>

<body>
    <!--HEADER: Nessa página o header terá um form para pesquisa de peças.-->
    <header class="header">
        <section>
            <a href="index.html" class="logo">
                <img class="logo-img" width="130" height="70" src="imagens/MotoWorldLogo.png" alt="" />
            </a>
            <form action="" method="GET" class="search-area">
                <label for="campo-pesquisa">Digite o nome da peça ex.: motor, suspensão, freios, elétrica, carenagem,
                    etc. </label>
                <input type="search" id="inputPesquisa" name="q" placeholder="Digite o que procura..." required>
                <button type="submit" id="btnPesquisar">Buscar</button>
            </form>
        </section>
    </header>
    <!--MAIN: Nessa página o container é apenas o bloco no qual serão distribuidos os cards através do JavaScript-->
    <main>
        <section>
            <!--MODAL que também está presente na página home aparece aqui novamente gerando informção sobre as peças-->
            <div class="modal-container">
                <div class="modal">
                    <div class="x" onClick="closeModal()">
                        <img onclick="closeModal()" width="30" height="30"
                            src="https://img.icons8.com/ios/50/FFFFFF/xbox-x.png" alt="xbox-x" />
                    </div>
                    <div class="content-modal">
                        <div class="modaltext-container">
                            <h1>Informações da peça</h1>
                            <h2>Referências:<span> X</span></h2>
                            <h2>Categoria:<span> X</span></h2>
                            <h2>Compatibilidade:<span> X</span></h2>
                            <br>
                            <h2>Tutorial de instalação:</h2>
                            <video width="720" height="480" controls autoplay muted loop>
                                <source src="videos/Preview.mp4">
                                </video>
                        </div>
                    </div>
                </div>
            </div>
            <div class="container-cards" id="containerCards">

            </div>
        </section>
    </main>
    <script src="js/page1script.js"></script>
</body>

</html>>
