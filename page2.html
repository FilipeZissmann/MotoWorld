<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MotoWorld Catálogos</title>
    <link rel="stylesheet" href="css/page2style.css">
</head>

<body>
    <!--HEADER-->
    <header class="header">
        <section>
            <a href="index.html" class="logo">
                <img class="logo-img" width="130" height="70" src="imagens/MotoWorldLogo.png" alt="" />
            </a>
            <form action="" method="GET" class="search-area">
                <label for="campo-pesquisa">Digite o nome da peça ex.: motor, suspensão, freios, elétrica, carenagem,
                    etc. </label>
                <input type="search" id="inputPesquisa" name="q" placeholder="Digite o que procura..." required>
                <button type="submit" id="btnPesquisar">Buscar</button>
            </form>
        </section>
    </header>
    <!--MAIN-->
    <main>
        <section>
            <div class="container-cards" id="containerCards">
                <div class="card">
                    <img src="" alt="${dados.alt}">
                    <div class="info-card">
                        <h3>Titulo</h3>
                    </div>
                    <div class="card-content">
                        <a href="#">+ Informações</a>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <script src="js/page1script.js"></script>
</body>

</html>>
